<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>takachi-life</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
    }
    header {
      text-align: center;
      margin-bottom: 48px;
    }
    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    header p {
      margin-top: 8px;
      color: #6e6e73;
      font-size: 0.95rem;
    }
    .apps {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
      max-width: 800px;
      width: 100%;
    }
    .app-card {
      background: #fff;
      border-radius: 16px;
      padding: 28px 24px;
      width: 280px;
      text-decoration: none;
      color: inherit;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .app-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.12);
    }
    .app-icon {
      width: 64px;
      height: 64px;
      border-radius: 14px;
      overflow: hidden;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }
    .app-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .app-name {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .app-desc {
      font-size: 0.85rem;
      color: #6e6e73;
      line-height: 1.6;
    }
    footer {
      margin-top: 64px;
      color: #aeaeb2;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>

  <header>
    <h1>takachi-life</h1>
    <p>シンプルで使いやすいアプリを開発しています。</p>
  </header>

  <div class="apps">
    <a class="app-card" href="/10sec-kakeibo/">
      <div class="app-icon"><img src="/10sec-kakeibo/icon.png" alt="10秒家計簿"></div>
      <div class="app-name">10秒家計簿</div>
      <div class="app-desc">サクッと記録、かんたん管理。毎日の支出を10秒で入力できる家計簿アプリ。</div>
    </a>
  </div>

  <footer>
    &copy; takachi-life
  </footer>

</body>
</html>

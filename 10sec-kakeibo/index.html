<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>10秒家計簿 - サクッと記録、かんたん管理</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 16px 80px;
    }
    .back {
      align-self: flex-start;
      max-width: 600px;
      width: 100%;
      margin: 0 auto 40px;
    }
    .back a {
      color: #007aff;
      text-decoration: none;
      font-size: 0.9rem;
    }
    .back a:hover { text-decoration: underline; }
    .hero {
      text-align: center;
      max-width: 600px;
      width: 100%;
      margin-bottom: 48px;
    }
    .app-icon {
      width: 96px;
      height: 96px;
      border-radius: 22px;
      overflow: hidden;
      margin: 0 auto 24px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    }
    .app-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .hero h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 12px;
    }
    .hero p {
      color: #6e6e73;
      font-size: 1rem;
      line-height: 1.7;
    }
    .store-btn {
      display: inline-block;
      margin-top: 32px;
      background: #1d1d1f;
      color: #fff;
      text-decoration: none;
      padding: 14px 32px;
      border-radius: 980px;
      font-size: 0.95rem;
      font-weight: 500;
      transition: background 0.15s ease;
    }
    .store-btn:hover { background: #3a3a3c; }
    .features {
      max-width: 600px;
      width: 100%;
      background: #fff;
      border-radius: 16px;
      padding: 32px 28px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      margin-bottom: 24px;
    }
    .features h2 {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 20px;
      color: #1d1d1f;
    }
    .feature-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .feature-list li {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      font-size: 0.9rem;
      line-height: 1.6;
      color: #3a3a3c;
    }
    .feature-list li .icon {
      font-size: 1.1rem;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .legal {
      max-width: 600px;
      width: 100%;
      display: flex;
      gap: 24px;
      justify-content: center;
      margin-top: 8px;
    }
    .legal a {
      color: #6e6e73;
      font-size: 0.8rem;
      text-decoration: none;
    }
    .legal a:hover { text-decoration: underline; }
    footer {
      margin-top: 48px;
      color: #aeaeb2;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>

  <div class="back">
    <a href="/">&larr; takachi-life</a>
  </div>

  <div class="hero">
    <div class="app-icon"><img src="/10sec-kakeibo/icon.png" alt="10秒家計簿"></div>
    <h1>10秒家計簿</h1>
    <p>サクッと記録、かんたん管理。<br>毎日の支出を10秒で入力できる家計簿アプリ。</p>
    <a class="store-btn" href="https://apps.apple.com/jp/app/id6760248708" target="_blank" rel="noopener">App Store でダウンロード</a>
  </div>

  <div class="features">
    <h2>特徴</h2>
    <ul class="feature-list">
      <li><span class="icon">⚡</span><span>ホーム画面ウィジェットからすぐに入力。アプリを開く手間なし。</span></li>
      <li><span class="icon">📂</span><span>カテゴリ別に支出を管理。よく使うカテゴリはウィジェットに表示。</span></li>
      <li><span class="icon">📷</span><span>レシートの写真を最大4枚まで添付して記録できる。</span></li>
      <li><span class="icon">🔒</span><span>入力したデータはすべてデバイス内に保存。外部に送信しない。</span></li>
    </ul>
  </div>

  <div class="legal">
    <a href="/10sec-kakeibo/legal/privacy-policy.html">プライバシーポリシー</a>
    <a href="/10sec-kakeibo/legal/terms-of-service.html">利用規約</a>
  </div>

  <footer>
    &copy; takachi-life
  </footer>

</body>
</html>
